name: tailscale-blade-mcp
version: "0.1.1"
description: >
  Network monitoring and security for Tailscale tailnets.
  Device inventory, ACL policy review, DNS configuration, auth key auditing,
  user management, and configuration audit logs with token-efficient output.
author: groupthink-dev
license: MIT
tier: certified
author_type: first-party
readiness: stub
homepage: https://github.com/groupthink-dev/tailscale-blade-mcp
contract: overlay-network-v1

services:
  overlay-network:
    info: ts_info
    devices: ts_devices
    device: ts_device
    device_routes: ts_device_routes
    acl: ts_acl
    dns: ts_dns
    keys: ts_keys
    users: ts_users
    audit_log: ts_audit_log
    authorize_device: ts_authorize_device
    set_tags: ts_set_tags
    expire_device: ts_expire_device
    approve_routes: ts_approve_routes
    manage_keys: ts_create_key

setup:
  icon: "network"
  product: "Tailscale"
  blurb: "Network monitoring and security for Tailscale tailnets"
  auth_model: api_key
  complexity: trivial
  fields:
    - key: TAILSCALE_API_KEY
      label: "API Key"
      secret: true
      required: true
      placeholder: "tskey-api-..."
      help: "API access token or OAuth bearer token from admin console"
    - key: TAILSCALE_TAILNET
      label: "Tailnet"
      secret: false
      required: false
      help: "Tailnet name or '-' for auto-detect (default: auto-detect)"
    - key: TAILSCALE_WRITE_ENABLED
      label: "Enable write operations"
      type: boolean
      required: false
      help: "Allow device authorization, tagging, key management, route approval"
  test:
    tool: ts_info
    expect: "tailnet"
  help:
    - label: "Generate API Key"
      url: "https://login.tailscale.com/admin/settings/keys"
    - label: "OAuth Client Setup"
      url: "https://tailscale.com/kb/1215/oauth-clients"

install:
  runtime: uv
  package: tailscale-blade-mcp
  command: tailscale-blade-mcp

env:
  - name: TAILSCALE_API_KEY
    description: "Tailscale API access token (tskey-api-...)"
    secret: true
  - name: TAILSCALE_TAILNET
    description: "Tailnet name or '-' for auto-detect"
    default: "-"
  - name: TAILSCALE_WRITE_ENABLED
    description: "Enable write operations (device auth, tagging, keys, routes)"
    default: "false"

requires:
  sidereal: ">=0.57"

conformance:
  required: "6/6"
  recommended: "3/3"
  gated: "5/5"
  last_tested: "2026-04-24"
